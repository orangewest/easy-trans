name: build

on:
  push:
    branches: [ main, 2.0.0 ]
  pull_request:
    branches: [ main, 2.0.0 ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and test
        run: mvn -B clean test
